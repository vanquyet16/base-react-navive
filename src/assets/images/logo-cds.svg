<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle - CDS Orange themed -->
  <circle cx="512" cy="512" r="400" fill="#FF6600" opacity="0.15"/>
  
  <!-- React logo atom paths - CDS Orange color -->
  <g transform="translate(512, 512)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="35" fill="#FF6600"/>
    
    <!-- Electron orbits -->
    <ellipse cx="0" cy="0" rx="300" ry="110" fill="none" stroke="#FF6600" stroke-width="18" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="300" ry="110" fill="none" stroke="#FF6600" stroke-width="18" opacity="0.9" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="300" ry="110" fill="none" stroke="#FF6600" stroke-width="18" opacity="0.9" transform="rotate(120)"/>
  </g>
</svg>
